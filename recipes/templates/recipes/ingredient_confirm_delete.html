{% extends 'recipes/base.html' %} {% block title %}Delete Ingredient{% endblock %} {% block content %}
<h2>Are you sure you want to delete this ingredient?</h2>
<p>{{ object.name }} ({{ object.quantity }} {{ object.unit }})</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
</form>
<a href="{% url 'recipe_update' object.recipe.id %}">Cancel</a>
{% endblock %}
