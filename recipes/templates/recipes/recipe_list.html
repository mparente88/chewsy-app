<h1>Recipe List</h1>
<a href="{% url 'recipe_create' %}">Create New Recipe</a>
<ul>
  {% for recipe in recipes %}
  <li>
    {{ recipe.title }} - {{ recipe.description }}
    <a href="{% url 'recipe_update' recipe.id %}">Edit</a>
    <a href="{% url 'recipe_delete' recipe.id %}">Delete</a>
  </li>
  {% endfor %}
</ul>
