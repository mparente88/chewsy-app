{% extends 'recipes/base.html' %} {% block title %}Recipe List{% endblock %} {% block content %}
<h2>Recipes</h2>
<ul>
  {% for recipe in recipes %}
  <li>
    <a href="{% url 'recipe_update' recipe.id %}">{{ recipe.title }}</a>
    - {{ recipe.description }}
    <a href="{% url 'recipe_delete' recipe.id %}">Delete</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
